<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Example 3</title>
    <link rel="stylesheet" href="../Example 3/style.css" />
  </head>
  <body>
    <div class="MainFlex">
      <div class="flex">
        <div class="first">First</div>
        <div class="second">Eighth</div>
      </div>
      <div class="grid">
        <div class="box three">Second</div>
        <!-- one → third -->
        <div class="box four">Third</div>
        <!-- two → fourth -->
        <div class="box five">Fourth</div>
        <!-- three → fifth -->
        <div class="box six">Fifth</div>
        <!-- four → sixth -->
        <div class="box seven">Seventh</div>
        <!-- five → seventh -->
        <div class="box eight">Sixth</div>
        <!-- six → eighth -->
        <div class="box nine">Ninth</div>
        <!-- seven → ninth -->
      </div>
    </div>
  </body>
</html>
