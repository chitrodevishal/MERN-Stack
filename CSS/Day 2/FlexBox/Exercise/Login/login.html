<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login form</title>
    <link rel="stylesheet" href="../Login/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Edu+NSW+ACT+Cursive:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+DK+Uloopet+Guides&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <form>
        <h1>Login</h1>

        <label for="first">Username/ Email </label>
        <input
          class="email"
          type="text"
          id="first"
          placeholder="Enter Your Username/ Email"
          required
          name="userEmail"
        />

        <label for="second">Password</label>
        <input
          class="password"
          type="password"
          id="second"
          placeholder="Enter Your Password"
          required
          maxlength="8"
          minlength="4"
          name="userpassword"
        /><label for="third"></label>

        <a class="forgot" href="../Forgot/forgot.html" target="_blank">Forgot password?</a>

        <!-- <hr class="bottom" /> -->

        <button>Login</button>

        <div class="bottom">
          <p style="display: inline">Don't have an account</p>
          <a class="signup" href="../signup/signup.html">Sign Up</a>
        </div>
      </form>
    </div>
  </body>
</html>
