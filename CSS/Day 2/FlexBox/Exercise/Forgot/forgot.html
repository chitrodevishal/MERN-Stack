<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot</title>
    <link rel="stylesheet" href="../Forgot/forgot.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=Edu+NSW+ACT+Cursive:wght@400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+DK+Uloopet+Guides&family=Public+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <form>
        <h1>Forgot Password</h1>

        <div>
          <label for="first">Email</label>
          <input
            type="email"
            id="first"
            placeholder="Enter Your Email"
            required
            name="userEmail"
          />
        </div>

        <div>
          <label for="second">Re-enter Email</label>
          <input
            type="email"
            id="second"
            placeholder="Re-enter Your Email"
            required
            name="userEmail"
          />
        </div>


        <button>Submit</button>
      </form>
    </div>
  </body>
</html>
