<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading & position</title>
    <link rel="stylesheet" href="../Cascading and position/Cascading-position.css">
</head>
<body>
    <!-- Here we will learn about cascading and position
     
    cascading
    1. Inline
    2. Internal
    3. External

    Position
    1. Static
    2. Relative
    3. Absolute
    4. Fixed
    5. Sticky

    as per cascading priority !important > inline >ID > Class > Tag>  internal > external
    
    -->


    <h1 id="static" class="position">This is static by default</h1>
    <h2 id="relative" class="position">This is Relative</h2>
    <h2 id="absolute" class="position">This is Absolute</h2>
    <h2 id="fixed" class="position">This is Fixed</h2>
    <h2 id="sticky" class="position">This is Sticky</h2>


    
    



</body>
</html>
