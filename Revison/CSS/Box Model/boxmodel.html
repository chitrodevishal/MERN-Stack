<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Model</title>
    <link rel="stylesheet" href="../Box Model/boxmodel.css" />
  </head>
  <body>
    <!-- This is about box model
    In which we will learn about margin,padding,borderm box size
    content-box is default-> (content width)
    border-box -> (Border width + padding width + content width + padding width + border width)

    Total width = width + padding-left + padding-right + border-left + border-right
    Total height = height + padding-top + padding-bottom + border-top + border-bottom

    Final space = total width + margin-left + margin-right
    -->

    <h1 id="borderbox">This is Border Box</h1>
    <h1 id="contentbox">This is Content Box</h1>
  </body>
</html>
