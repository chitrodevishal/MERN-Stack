<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register for the university.</p>

    <hr />

    <form>
      <h2>Personal Details</h2>

      <label for="First">First Name:</label>
      <input
        type="text"
        id="first"
        required
        name="userFirst"
        placeholder="e.g., Ram"
      />

      <br /><br />

      <label for="last">Last Name:</label>
      <input
        type="text"
        id="last"
        required
        name="userLast"
        placeholder="e.g, Kumar"
      />

      <br /><br />

      <label for="sex">Gender:</label>
      <br />
      <input type="radio" name="Gender" id="male" value="Male" />
      <label for="male">Male</label>
      <br />
      <input type="radio" name="Gender" id="female" value="Female" />
      <label for="female">Female</label>
      <br />
      <input type="radio" name="Gender" id="other" value="Other" />
      <label for="other">Other</label>
      <br /><br />
      <label for="file">Upload a file:</label>
      <input type="file" id="file" name="userFile" />

      <hr />
      <h2>Contact Information</h2>
      <label for="email">Email Address:</label>
      <input
        type="email"
        id="email"
        name="userEmail"
        required
        placeholder="xyz@gmail.com"
      />
      <br /><br />
      <label for="phone">Phone Number:</label>
      <input
        type="number"
        required
        id="phone"
        name="userPhone"
        pattern="(0-9){10}"
        placeholder="e.g., 9876543210"
      />

      <br /><br />
      <label for="Address">Email Addressing:</label>
      <br />
      <textarea
        name="UserAddress"
        id="Address"
        cols="30"
        rows="5"
        placeholder="Street Address, City, State, Zip Code"
        req
      ></textarea>
      <br /><br />
      <hr />
      <h2>Academic Details</h2>

      <label for="course">Select Your Course:</label>
      <select name="userCourse" id="course">
        <option disabled selected>Select Your Course</option>
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="ME">ME</option>
        <option value="CE">CE</option>
        <option value="EE">EE</option>
        <option value="DA">DA</option>
      </select>

      <br /><br />

      <label for="activity">Extra Curricular Activities:</label>
      <br />
      <input type="checkbox" id="sport" name="UserActivity" />
      <label for="sport">Sports</label>
      <br />
      <input type="checkbox" id="music" name="UserAcitivty" />
      <label for="music">Music & Arts</label>
      <br />
      <input type="checkbox" id="tech" name="UserActivity" />
      <label for="tech">Technology Clubs</label>
      <br />
      <input type="checkbox" id="vol" name="UserActivity" />
      <label for="vol"> Volunteering</label>
      <br /><br />
      <hr />
      <h2>Create Your Account:</h2>
      <label for="password">Create a Password:</label>
      <input type="password" id="password" name="UserPassword" minlength="8" />

      <br /><br />

      <label for="secquw">Security Question:</label>
      <select name="Usersecque" id="secque">
        <option disabled selected>Select Your Question</option>
        <option value="pet">What is your pet name?</option>
        <option value="color">What is your favorite color?</option>
        <option value="place">What is your favorite place?</option>
        <option value="movie">What is your favorite movie?</option>
      </select>

      <br /><br />
      <label for="secans">Security Answer:</label>
      <input type="text" id="secans" name="Usersecans" />

      <br /><br />

      <input type="checkbox" id="check" name="UserCheck" />
      <label for="check"> I agree to the terms and conditions.</label>
      <br /><br />
      <hr>
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>
  </body>
</html>
