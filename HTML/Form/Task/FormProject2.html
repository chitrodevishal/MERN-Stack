Here is a **clear, concise summary** of how the `name` attribute works in HTML forms.

---

# ✅ Where `name` Works (Form Data is Sent)

The `name` attribute must be on **form controls** — these are the only elements whose values get submitted.

### ✔ Supported Elements

| Tag          | Works with `name`    | Example                                |
| ------------ | -------------------- | -------------------------------------- |
| `<input>`    | ✅ Yes                | `<input name="email">`                 |
| `<select>`   | ✅ Yes                | `<select name="course">`               |
| `<textarea>` | ✅ Yes                | `<textarea name="message"></textarea>` |
| `<button>`   | ✅ (if submit button) | `<button name="action">`               |

---

# ❌ Where `name` Does NOT Work

These elements do **not send data**, so `name` is useless here:

| Tag                      | Why                                           |
| ------------------------ | --------------------------------------------- |
| `<label>`                | Only for UI (links text to input)             |
| `<option>`               | Value comes from `<select>`                   |
| `<div>`, `<span>`, `<p>` | Not form controls                             |
| `<form>`                 | Uses `action` & `method`, not `name` for data |

---

# 🧠 Key Rule

> ✅ **Only form controls with `name` are included in submission**

---

# 🔍 How Data is Sent

Example:

```html
<input type="text" name="username" value="Vishal">
```

👉 URL becomes:

```text
?username=Vishal
```

---

# 📌 Special Cases

## 1. Radio Buttons

```html
<input type="radio" name="gender" value="Male">
<input type="radio" name="gender" value="Female">
```

👉 Only **selected one** is sent:

```text
gender=Male
```

---

## 2. Checkboxes

```html
<input type="checkbox" name="skills" value="React">
<input type="checkbox" name="skills" value="Node">
```

👉 Multiple values:

```text
skills=React&skills=Node
```

---

## 3. Select Dropdown

```html
<select name="course">
  <option value="CSE">CSE</option>
</select>
```

👉 Output:

```text
course=CSE
```

---

# 🚫 Common Mistake (Your Case)

```html
<label name="skills">React</label> ❌
```

✔ Correct:

```html
<input type="checkbox" name="skills" value="React"> ✅
```

---

# 🧾 Final Summary

* `name` is **mandatory for submission**
* Works only on:

  * `<input>`
  * `<select>`
  * `<textarea>`
* Does NOT work on:

  * `<label>`
  * `<option>`
* No `name` → ❌ data not sent
