<!--Some doubt while creating the form

like Q.Why some fields appear in the URL and others don’t
Ans. When you submit a form:

Only inputs with a name attribute are included in the URL (or request body)
Fields without name are ignored completely 

❌ Problem in your form

These fields are missing name, so they are NOT sent:
<input type="password" id="password">
<select id="security-question">
<input type="text" id="security-answer">

✅ Fix: Add name attributes

Update like this:
<label for="password">Create a Password:</label>
<input type="password" id="password" name="password">

<br><br>

<label for="security-question">Security Question:</label>
<select id="security-question" name="security_question">
    <option value="color">What is your favorite color?</option>
    <option value="pet">What is the name of your first pet?</option>
    <option value="mother">What is your mother's maiden name?</option>
</select>

<br><br>

<label for="security-answer">Security Answer:</label>
<input type="text" id="security-answer" name="security_answer">

📌 After Fix — Your URL will look like:
http://127.0.0.1:5500/HTML/Form/FormProject.html?
Fname=Vishal
&Lname=Chitrode
&dob=2026-03-23
&gender=Male
&password=12345
&security_question=color
&security_answer=blue

🧠 Key Rule to Remember

✅ No name → No data submission

✔ Quick Checklist
 Add name to every input
 Use POST for sensitive data
 Use unique IDs
 Link labels properly
-->
